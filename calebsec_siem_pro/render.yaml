services:
  - type: web
    name: calebsec
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: ENABLE_MACOS_INGEST
        value: "false"
      - key: PYTHON_VERSION
        value: "3.13.5"
