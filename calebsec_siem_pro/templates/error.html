<!DOCTYPE html>
<html>
<head>
    <title>CalebSec Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0b1020, #111827);
            color: #e5e7eb;
        }

        .error-card {
            width: 100%;
            max-width: 720px;
            padding: 38px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.14);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 24px;
            border-radius: 999px;
            background: rgba(16, 185, 129, 0.14);
            color: #6ee7b7;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .code {
            margin-bottom: 14px;
            font-size: 72px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.05em;
            color: #f8fafc;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 34px;
            color: #f8fafc;
        }

        p {
            margin: 0 0 28px 0;
            font-size: 17px;
            line-height: 1.65;
            color: #cbd5e1;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 13px 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 800;
            font-size: 15px;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .primary {
            background: #10b981;
            color: #04130e;
        }

        .secondary {
            background: #334155;
            color: #f8fafc;
        }

        @media (max-width: 700px) {
            .error-card {
                padding: 28px;
            }

            .code {
                font-size: 58px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <main class="error-card">
        <div class="brand">CalebSec</div>

        <div class="code">{{ status_code }}</div>

        <h1>{{ title }}</h1>

        <p>{{ message }}</p>

        <div class="actions">
            <a class="btn primary" href="/">Return to Dashboard</a>
            <a class="btn secondary" href="/health">Check Service Health</a>
        </div>
    </main>
</body>
</html>
